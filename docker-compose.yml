services:
  postgres:
    image: postgres:16-alpine
    container_name: conduit-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
      POSTGRES_DB: conduit_dev
    ports:
      - "5432:5432"
    volumes:
      - conduit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduit -d conduit_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  conduit-pgdata:
